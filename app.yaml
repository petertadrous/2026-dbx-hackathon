command:
  - sh
  - -c
  - "uv run streamlit run app.py --server.port $DATABRICKS_APP_PORT --server.address 0.0.0.0 --server.headless true"
env:
  - name: STREAMLIT_SERVER_ENABLE_CORS
    value: "false"
  - name: STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION
    value: "false"
  - name: LAKEBASE_ENDPOINT
    valueFrom: postgres
  - name: PYTHONPATH
    value: "src"
