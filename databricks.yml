bundle:
  name: phantom-census-streamlit

sync:
  exclude:
    - .venv/**
    - .pytest_cache/**
    - __pycache__/**
    - "**/__pycache__/**"
    - "*.pyc"
    - .git/**
    - data/**
    - phantom-census-app/**
    - notebooks/**
    - tests/**
    - docs/intent/**
    - .claude/**

variables:
  postgres_branch:
    description: >
      Full Lakebase Postgres branch resource name. Obtain by running
      `databricks postgres list-branches projects/phantom-census --profile DEFAULT`
      and using the .name field of the desired item.
    default: projects/phantom-census/branches/production
  postgres_database:
    description: >
      Full Lakebase Postgres database resource name. Obtain by running
      `databricks postgres list-databases projects/phantom-census/branches/production --profile DEFAULT`
      and using the .name field of the desired item.
    default: projects/phantom-census/branches/production/databases/databricks-postgres

resources:
  apps:
    phantom_census:
      name: phantom-census
      description: >
        Phantom Census — Streamlit app for healthcare desert detection with
        phantom-facility verdicts, AI advisory on contested cases, budget
        reallocation, audit queue, and Genie sidebar.
      source_code_path: ./
      resources:
        - name: postgres
          postgres:
            branch: ${var.postgres_branch}
            database: ${var.postgres_database}
            permission: CAN_CONNECT_AND_CREATE

targets:
  default:
    default: true
    workspace:
      host: https://dbc-f6aba42c-dca4.cloud.databricks.com
