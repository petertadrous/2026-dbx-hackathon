name: Databricks bundle deploy

on:
  push:
    branches:
      - updated-specs
  workflow_dispatch: {}

# Cancel any in-flight deploy for the same ref when a new push lands.
concurrency:
  group: databricks-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Service-principal OAuth M2M auth — used by every `databricks` CLI call
      # in this workflow. Configured under repository secrets.
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_AUTH_TYPE: oauth-m2m

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install Python deps (dev extras)
        run: uv sync --extra dev

      - name: Run unit tests (Lakebase suite skips without Docker)
        run: uv run pytest tests --no-header -q

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate

      - name: Deploy bundle
        run: databricks bundle deploy

      - name: Run app (apply config + restart)
        run: databricks bundle run phantom_census
